# Envoy AI Gateway v0.5 target sample using GatewayConfig.
# This is the migration target for deploy/gateway/v0.4-sample.yaml.
# Verify the installed CRD apiVersion in the target cluster before applying.
#
# Apply order:
#   1. deploy/redis/values.yaml              (Redis in default namespace)
#   2. deploy/memory-extproc/deployment.yaml  (memory-extproc Deployment + Service)
#   3. this file                              (GatewayConfig, Gateway, Backend, AIServiceBackend, AIGatewayRoute, EnvoyExtensionPolicy)
---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: GatewayConfig
metadata:
  name: memory-enabled-config
  namespace: default
spec:
  extProc:
    kubernetes:
      env:
        - name: REDIS_URL
          value: "redis://redis-master.default.svc.cluster.local:6379"
        - name: MEMORY_TTL_SECONDS
          value: "3600"
        - name: MAX_HISTORY_LENGTH
          value: "20"
        - name: SESSION_HEADER
          value: "x-session-id"
        - name: REDIS_FAILURE_POLICY
          value: "fail-open"
        - name: MISSING_SESSION_POLICY
          value: "pass-through"
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ai-gateway
  namespace: default
  annotations:
    aigateway.envoyproxy.io/gateway-config: memory-enabled-config
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: openai-compatible-backend
  namespace: default
spec:
  endpoints:
    - fqdn:
        hostname: generativelanguage.googleapis.com
        port: 443
---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIServiceBackend
metadata:
  name: openai-compatible-ai-backend
  namespace: default
spec:
  schema:
    name: OpenAI
    prefix: "/v1beta/openai"
  backendRef:
    name: openai-compatible-backend
    kind: Backend
    group: gateway.envoyproxy.io
  # Example v0.5 body mutation. Memory message merging is handled by the custom ExtProc.
  bodyMutation:
    set:
      - path: "service_tier"
        value: '"standard"'
    remove:
      - "internal_debug"
---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIGatewayRoute
metadata:
  name: openai-compatible-route
  namespace: default
spec:
  parentRefs:
    - name: ai-gateway
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - backendRefs:
        - name: openai-compatible-ai-backend
          weight: 1
---
# EnvoyExtensionPolicy: connects our custom memory-extproc gRPC server to Envoy.
# GatewayConfig.spec.extProc only configures the AI Gateway built-in ExtProc container
# (env vars, resources). Connecting a custom ExtProc requires EnvoyExtensionPolicy.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: memory-extproc-policy
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ai-gateway
  extProc:
    - backendRefs:
        - name: memory-extproc
          port: 50051
      processingMode:
        request:
          body: Buffered
        response:
          body: Buffered
