# Envoy Gateway direct Upstage sample.
#
# This sample routes directly:
#   HTTPRoute -> Backend(api.upstage.ai)
# with custom memory-extproc attached by EnvoyExtensionPolicy.
#
# Prerequisites:
#   1. Redis and memory-extproc are deployed in the default namespace.
#   2. Upstage API key is sent by client header:
#      Authorization: Bearer <UPSTAGE_API_KEY>
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: upstage-direct-gateway
  namespace: default
spec:
  gatewayClassName: test-gateway-class
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: upstage-backend
  namespace: default
spec:
  endpoints:
    - fqdn:
        hostname: api.upstage.ai
        port: 443
  tls:
    caCertificateRefs:
      - group: ""
        kind: ConfigMap
        name: upstage-ca
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: upstage-direct-route
  namespace: default
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: upstage-direct-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat/completions
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: upstage-backend
          port: 443
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: upstage-direct-memory-extproc-policy
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: upstage-direct-gateway
  extProc:
    - backendRefs:
        - name: memory-extproc
          port: 50051
      processingMode:
        request:
          body: Buffered
        response:
          body: Buffered
